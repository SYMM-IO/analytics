<div class="root w-full h-full flex flex-column align-items-center justify-content-center dots-background">
    <app-glowing-dots [numberOfDots]="12" [glowSpeed]="10"></app-glowing-dots>
    <div tuiCardLarge size="l" textAlign="center" class="flex flex-column align-items-center gap-3 login-card" style="position: relative; z-index: 1">
        <img src="../assets/poweredByLogo.svg" style="width: 48px; height: 48px; margin-bottom: 0.5rem">
        <h3 class="title" style="font-family: Inter, sans-serif; font-weight: 600; font-size: 1.25rem"> Enter your credentials </h3>
        <form class="w-full flex flex-column gap-2" [formGroup]="form">
            <tui-input formControlName="username">
                Username
                <input name="username" tuiTextfieldLegacy/>
            </tui-input>
            <tui-input formControlName="password">
                Password
                <input name="password" tuiTextfieldLegacy type="password"/>
            </tui-input>
        </form>
        <button tuiButton type="button" appearance="primary" class="w-full" (click)="onLogin()" [disabled]="!form.valid"
                [loading]="loadingService.loading()">
            Login
        </button>
    </div>
</div>

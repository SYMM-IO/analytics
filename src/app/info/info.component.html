<div class="info-inner flex flex-column p-3 gap-1">
    <span class="info-label text-sm" style="text-transform: uppercase; letter-spacing: 0.08em; font-weight: 600">{{ title }}</span>
    <span class="info-value text-2xl font-bold" [tuiSkeleton]="totalValue == null" style="min-width: 10em; line-height: 1.2">{{ totalValue != null ? formatValue(totalValue) : '&nbsp;' }}</span>
    <div class="flex flex-row align-items-center gap-1" style="min-height: 1em">
        <span class="info-monthly-label text-xs">
            Monthly
        </span>
        <span class="info-monthly-value text-xs font-medium" [tuiSkeleton]="totalValue == null" style="min-width: 8em">
            {{ lastMonthValue != null ? formatValue(lastMonthValue) : '' }}
        </span>
    </div>
</div>
